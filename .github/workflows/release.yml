name: release

# Tag push (vX.Y.Z) runs the full gate, builds prebuilt binaries for each
# supported platform, and cuts a GitHub release with generated notes plus
# the packaged archives and a SHA256SUMS manifest. workflow_dispatch runs
# the same pipeline as a dry run (no release is created).
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Full gate
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test

  build:
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package archive (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          name="bage-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/bage" README.md LICENSE "$name/"
          tar -czf "$name.tar.gz" "$name"
      - name: Package archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "bage-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $name | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/bage.exe", "README.md", "LICENSE" -Destination $name
          Compress-Archive -Path $name -DestinationPath "$name.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: bage-${{ matrix.target }}
          path: |
            bage-*.tar.gz
            bage-*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: sha256sum bage-* > SHA256SUMS
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes artifacts/*
