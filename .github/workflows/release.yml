name: release

# Tag push (vX.Y.Z) cuts a source-only release (source tarball + checksums +
# changelog; no prebuilt binaries — see .goreleaser.yml). workflow_dispatch runs
# a no-publish snapshot dry-run.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: Install mage
        shell: bash
        run: |
          go install github.com/magefile/mage@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run canonical CI gate
        shell: bash
        run: mage ci
      - name: GoReleaser (source-only release on tag, snapshot dry-run on manual)
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: >-
            ${{ startsWith(github.ref, 'refs/tags/')
                && 'release --clean'
                || 'release --snapshot --clean --skip=publish' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
