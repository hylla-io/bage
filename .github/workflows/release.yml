name: release

# Tag push (vX.Y.Z) cuts a real release. Manual workflow_dispatch runs a snapshot
# dry-run that builds every target (incl. the zig CGO cross-compiles) WITHOUT
# publishing — use it to prove the cross-build before ever tagging.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: Set up zig (CGO cross-compiler)
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0
      - name: Install mage
        shell: bash
        run: |
          go install github.com/magefile/mage@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run canonical CI gate
        shell: bash
        run: mage ci
      - name: GoReleaser (release on tag, snapshot dry-run on manual)
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: >-
            ${{ startsWith(github.ref, 'refs/tags/')
                && 'release --clean'
                || 'release --snapshot --clean --skip=publish' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
