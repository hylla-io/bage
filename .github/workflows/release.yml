name: release

# Tag push (vX.Y.Z) runs the full gate, builds prebuilt binaries for each
# supported platform, and cuts a GitHub release with generated notes plus
# the packaged archives and a SHA256SUMS manifest. workflow_dispatch runs
# the same pipeline as a dry run (no release is created).
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Least privilege by default; only the release job is granted write.
permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Full gate
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test

  build:
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package archive (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ref="${GITHUB_REF_NAME//\//-}"
          name="bage-${ref}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/bage" README.md LICENSE "$name/"
          tar -czf "$name.tar.gz" "$name"
      - name: Package archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ref = $env:GITHUB_REF_NAME -replace '/','-'
          $name = "bage-$ref-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $name | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/bage.exe", "README.md", "LICENSE" -Destination $name
          Compress-Archive -Path $name -DestinationPath "$name.zip"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bage-${{ matrix.target }}
          path: |
            bage-*.tar.gz
            bage-*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: sha256sum bage-* > SHA256SUMS
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes artifacts/*
