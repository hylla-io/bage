# GoReleaser config for the standalone `bage` CLI.
#
# Båge is CGO (tree-sitter grammars are C), so unlike a pure-Go project the binary
# needs a C toolchain per target. Cross-compilation uses `zig cc` as CC/CXX — the
# release workflow installs zig and goreleaser drives one build per GOOS/GOARCH.
#
# Targets: linux + darwin, amd64 + arm64 (tree-sitter is plain C over libc, which
# zig cross-compiles cleanly). Windows is intentionally omitted for v0.x — CGO +
# zig + windows is the brittlest combination; Windows users build from source
# (`go build ./cmd/bage`, requires a local C toolchain). Verify any target before
# relying on it via the workflow_dispatch snapshot dry-run in release.yml.
version: 2

project_name: bage

builds:
  - id: bage
    main: ./cmd/bage
    binary: bage
    env:
      - CGO_ENABLED=1
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # Per-target C toolchain via zig. tree-sitter needs only libc/stdlib, so the
    # `-none` macOS target (no SDK) suffices; the Go runtime supplies darwin syscalls.
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CC=zig cc -target x86_64-linux-gnu
          - CXX=zig c++ -target x86_64-linux-gnu
      - goos: linux
        goarch: arm64
        env:
          - CC=zig cc -target aarch64-linux-gnu
          - CXX=zig c++ -target aarch64-linux-gnu
      - goos: darwin
        goarch: amd64
        env:
          - CC=zig cc -target x86_64-macos-none
          - CXX=zig c++ -target x86_64-macos-none
      - goos: darwin
        goarch: arm64
        env:
          - CC=zig cc -target aarch64-macos-none
          - CXX=zig c++ -target aarch64-macos-none

archives:
  - id: default
    ids:
      - bage
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  use: github-native

release:
  prerelease: auto
