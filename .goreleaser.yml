# GoReleaser config for Båge.
#
# Source-only release: a tag publishes a source tarball + checksums + changelog,
# NOT prebuilt binaries. Båge is CGO (tree-sitter grammars are C), and
# cross-compiling 20+ CGO grammars with zig hits a zig cache bug ("unable to
# create compilation: AccessDenied"). Prebuilt binaries are deferred to a
# follow-up using a native per-OS runner matrix (linux on ubuntu, macOS on
# macos-latest). Standalone users install from source:
#   go install github.com/hylla-io/bage/cmd/bage@latest   (needs a local C toolchain)
# The library is consumed via `go get` and needs none of this.
version: 2

project_name: bage

builds:
  - id: bage
    skip: true

source:
  enabled: true

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  use: github-native

release:
  prerelease: auto
